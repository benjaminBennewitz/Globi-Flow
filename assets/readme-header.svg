<svg width="1440" height="520" viewBox="0 0 1440 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Daten Dashboards</title>
<desc id="desc">Neomorphic interface preview for a local lab results assistant.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="520" gradientUnits="userSpaceOnUse">
    <stop stop-color="#F9F9FF"/>
    <stop offset="1" stop-color="#E7E8F0"/>
  </linearGradient>
  <linearGradient id="primary" x1="238" y1="170" x2="1202" y2="410" gradientUnits="userSpaceOnUse">
    <stop stop-color="#005DB6"/>
    <stop offset="1" stop-color="#793100"/>
  </linearGradient>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="-10" dy="-10" stdDeviation="12" flood-color="#FFFFFF" flood-opacity="0.95"/>
    <feDropShadow dx="12" dy="12" stdDeviation="16" flood-color="#D1D9E6" flood-opacity="0.95"/>
  </filter>
  <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feOffset dx="5" dy="5"/>
    <feGaussianBlur stdDeviation="8" result="offset-blur"/>
    <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
    <feFlood flood-color="#D1D9E6" flood-opacity="0.85" result="color"/>
    <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
    <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
  </filter>
</defs>

