<svg width="1440" height="430" viewBox="0 0 1440 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Daten Dashboards Workflow</title>
<desc id="desc">Workflow from test PDF and upload to import, review, analysis dashboard and patient report.</desc>
<defs>
  <filter id="raised" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="-8" dy="-8" stdDeviation="12" flood-color="#FFFFFF" flood-opacity="0.95"/>
    <feDropShadow dx="10" dy="10" stdDeviation="14" flood-color="#D1D9E6" flood-opacity="0.9"/>
  </filter>
  <linearGradient id="line" x1="185" y1="215" x2="1255" y2="215" gradientUnits="userSpaceOnUse">
    <stop stop-color="#00478D"/>
    <stop offset="0.5" stop-color="#575F67"/>
    <stop offset="1" stop-color="#793100"/>
  </linearGradient>
</defs>

<rect width="1440" height="430" rx="32" fill="#F9F9FF"/>
<rect x="68" y="52" width="1304" height="326" rx="34" fill="#ECEDF6" filter="url(#raised)"/>

<path d="M242 215 H1198" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
<path d="M1198 215 L1172 199 M1198 215 L1172 231" stroke="#793100" stroke-width="8" stroke-linecap="round"/>

